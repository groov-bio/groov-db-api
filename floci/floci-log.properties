# Runtime Quarkus config overlay for the pinned floci/floci image. Mounted by
# docker-compose.yml at /app/config/application.properties -- a standard Quarkus
# runtime config location (a `config/` dir relative to the app's /app workdir),
# which overlays the image's baked-in config without replacing it.
#
# Purpose: quiet the per-Lambda-invocation container-lifecycle chatter that
# otherwise floods `docker compose logs floci` / Docker Desktop, WITHOUT hiding
# your Lambda's own stdout or real warnings/errors.
#
# Why a file and not env vars: the image is a Quarkus NATIVE binary. Only a
# small set of logger categories were baked in at build time (io.vertx, etc.);
# for any other logger, QUARKUS_LOG_CATEGORY__<NAME>__LEVEL env vars are ignored
# because the dotted logger name can't be reconstructed from the underscored
# env-var form. A properties file supplies the exact dotted keys, so it works.
#
# Two mechanisms, belt-and-suspenders:
#
# 1) Raise the noisy loggers to WARN (real errors on these still print). Logger
#    names were read from the floci binary; a Floci upgrade that renames a class
#    would make its INFO lines reappear -- harmless, just update the name here.
quarkus.log.category."io.github.hectorvent.floci.services.lambda.launcher".level=WARN
quarkus.log.category."io.github.hectorvent.floci.services.lambda.runtime".level=WARN
quarkus.log.category."io.github.hectorvent.floci.services.cloudwatch.logs".level=WARN
quarkus.log.category."io.github.hectorvent.floci.core.common.docker.ContainerLifecycleManager".level=WARN
quarkus.log.category."io.github.hectorvent.floci.core.common.docker.DockerHostResolver".level=WARN

# 2) A message-prefix console filter as a backstop, matching by text rather than
#    logger name. Your Lambda's stdout is streamed as "[lambda:<fn>] ..." and
#    warnings/errors don't start with these prefixes, so they still pass through.
quarkus.log.filter."floci-lifecycle-noise".if-starts-with=Launching container,Created container,Started container,Stopping container,Created log stream,Running in Docker,RuntimeApiServer started
quarkus.log.console.filter=floci-lifecycle-noise
