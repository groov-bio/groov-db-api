# Local, single-command emulation of the groov-db-api V2 API on Floci (a free
# LocalStack-community drop-in) + the groov-db-ui frontend.
#
# Run `docker compose up` from THIS directory (the groov-db-api repo root) --
# floci-init derives Lambda hot-reload paths from ${PWD}, which must resolve
# to this repo's absolute path on the host.
#
#   floci      -- DynamoDB + S3 + Cognito + API Gateway (HTTP API) + real
#                 Lambda containers, code hot-reloaded (bind-mounted) from
#                 functions/. No rebuild/redeploy needed after editing a
#                 handler .py -- just re-invoke.
#   floci-init -- idempotent Python provisioner (floci/provisioner.py) that
#                 derives the local stack from template.yaml: tables, buckets,
#                 Cognito, layers, the 12 V2 Lambda functions + authorizer +
#                 updateFingerprintV2, the HTTP API/routes/authorizers, and
#                 writes runtime values (API id, Cognito ids) to the
#                 `floci_shared` volume for the UI to pick up. Safe to re-run
#                 without a `down -v` first -- see floci/provisioner.py.
#   ui         -- groov-db-ui (../groov-db-ui), reads floci_shared/ui.env at
#                 startup.
#
# Region is NOT us-east-1 everywhere in this stack: API Gateway / Cognito /
# Lambda are us-east-1 (Floci resolves header-less requests to us-east-1;
# anything else 404s on invoke), but DynamoDB tables are deliberately
# us-east-2 -- every V2 handler hardcodes region_name="us-east-2" in its
# boto3.resource("dynamodb", ...) call, and Floci scopes DynamoDB per-region.
# See floci/provisioner.py for the full derivation.

services:
  floci:
    # Pinned to a known-good digest rather than :latest -- floci/floci is a
    # moving target and an unpinned tag can silently change local-vs-prod
    # behavior underneath this whole stack.
    image: floci/floci@sha256:690f3077367a866a28509a35bdf1258246bf20b19ec06fcb59093726ee60f7f4
    container_name: groov-floci
    ports:
      - "4566:4566"
    environment:
      - FLOCI_SERVICES_LAMBDA_HOT_RELOAD_ENABLED=true
      - DEBUG=${FLOCI_DEBUG:-0}
      # Allow the CRA dev origin through Floci's global CORS filter so the UI's
      # browser-side Cognito InitiateAuth (raw fetch to :4566 with X-Amz-Target)
      # passes preflight. These EXTRA_* vars add to Floci's built-in defaults.
      - FLOCI_SECURITY_EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - FLOCI_SECURITY_EXTRA_CORS_ALLOWED_HEADERS=x-amz-target,x-amz-user-agent,x-amz-content-sha256,x-amz-date,x-amz-security-token,authorization,content-type
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Quiet Floci's per-invocation container-lifecycle chatter that otherwise
      # floods `docker compose logs floci` / Docker Desktop. Floci is a Quarkus
      # NATIVE binary; it only honors log-level/filter overrides through a
      # runtime config *file* at /app/config/application.properties (relative to
      # its /app workdir) -- the equivalent QUARKUS_LOG_CATEGORY__*__LEVEL env
      # vars are silently ignored for loggers not baked in at build time. See
      # that file for what's silenced (Lambda stdout + real errors are kept).
      # Comment this mount out and recreate `floci` for the full firehose (the
      # message filter in that file suppresses the lines even under FLOCI_DEBUG).
      - ./floci/floci-log.properties:/app/config/application.properties:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  floci-init:
    # Python provisioner (floci/provisioner.py) that derives the local stack
    # from template.yaml, instead of the old hand-maintained provision.sh
    # mirror. Entrypoint is baked into floci/Dockerfile.
    build:
      context: ./floci
    container_name: groov-floci-init
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://floci:4566
      # Absolute HOST path to this repo, used to build the hot-reload
      # S3Key=<HOST_ABS_PATH_TO_FN_DIR> values -- Floci bind-mounts those via
      # the HOST docker daemon (shared via the docker.sock mount on `floci`),
      # not via this container's own filesystem view.
      - HOST_API_DIR=${PWD}
    volumes:
      - .:/workspace:ro
      - floci_shared:/shared

  # Exact shape locked with the UI agent: their Dockerfile bakes
  # ENTRYPOINT ["./docker-entrypoint.sh"] + CMD ["npm","start"], and the
  # entrypoint sources /shared/ui.env before starting CRA -- so this block
  # must NOT override command/entrypoint.
  #
  # `develop.watch` (Compose 2.31+) replaces the old host bind mount +
  # anonymous node_modules volume: source changes are synced straight into
  # the built image's /app instead of overlaying the host tree over it, so a
  # `package.json` change (which used to leave a stale baked node_modules
  # under the host bind mount) now triggers a full image rebuild instead.
  # This also removes the need for the CRA polling env vars. NOTE: watch
  # actions only engage under `docker compose up --watch` (or
  # `docker compose watch`) -- plain `docker compose up` will not sync/rebuild.
  # UNVERIFIED: whether dropping the bind mount affects the entrypoint's
  # /shared/ui.env sourcing or CRA hot-reload -- flagging for live check.
  ui:
    build:
      context: ../groov-db-ui
    container_name: groov-ui
    ports:
      - "3000:3000"
    depends_on:
      floci-init:
        condition: service_completed_successfully
    environment:
      - WDS_SOCKET_PORT=0
      # Which seeded user the UI auto-signs-in as under local auth. Empty =>
      # the shim's default (admin@groov.local). Set by `floci/dev.sh --user`,
      # which exports GROOV_LOCAL_AUTH_USER before `docker compose up`; changing
      # it recreates this container so CRA re-reads it at `npm start`.
      - REACT_APP_LOCAL_AUTH_USER=${GROOV_LOCAL_AUTH_USER:-}
      # `src`/`public` are bind-mounted below, not sync-copied. Docker Desktop's
      # virtualized filesystem does not forward host inotify/fsevents into the
      # container, so webpack-dev-server's default watcher would never see edits
      # through the mount. Polling makes it re-read the files on an interval,
      # which is reliable across the VM boundary. (chokidar for react-scripts'
      # own watch; watchpack for webpack 5's.)
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - floci_shared:/shared:ro
      # Bind-mount the UI source straight into the container instead of relying
      # on `docker compose watch`'s `sync` copy. On this macOS/Docker Desktop
      # setup that copy silently no-ops for these `../`-sibling paths: `compose
      # watch` PRINTS "Syncing service ui after N changes" but nothing lands in
      # the container, so edits never hot-reload (see api_v2_docs/
      # LOCAL_DEV_INCONSISTENCY_FINDING.md). A bind mount has no copy step to
      # fail — the container reads the host files directly. Only src/public are
      # mounted, so the image's /app/node_modules stays intact.
      - ../groov-db-ui/src:/app/src
      - ../groov-db-ui/public:/app/public
    develop:
      watch:
        # A package.json / lockfile change needs a full image rebuild (new deps),
        # which a bind mount can't provide — keep these two as rebuild triggers.
        - action: rebuild
          path: ../groov-db-ui/package.json
        - action: rebuild
          path: ../groov-db-ui/package-lock.json

volumes:
  floci_shared:
