name: Deploy SAM Application

on:
  push:
    branches: [ stage, main ]
  pull_request:
    branches: [ stage, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # Match the V2 Lambda runtime so tests validate the real target.
        python-version: '3.14'

    - name: Install Python test dependencies
      # pydantic backs the shared validation models in layers/python-v2/shared.
      run: pip install boto3 requests pydantic

    - name: Run Python V2 unit tests
      run: python -m unittest discover -s tests/unit -p "test_*.py"

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Node.js dependencies for NodeLayer
      run: |
        cd layers/node
        npm install

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # Both interpreters are required: 3.12 builds the rdkit layer and the
        # remaining python3.12 functions; 3.14 builds the V2 functions/layer.
        # sam build resolves each function's Runtime to the matching binary.
        python-version: |
          3.12
          3.14

    - name: Install Python dependencies for PythonLayer
      run: |
        cd layers/python
        # Remove any old build if needed
        rm -rf python
        # rdkit is a compiled dep — build under 3.12 for the python3.12 runtime.
        python3.12 -m pip install --target python -r requirements.txt

    - name: Install Python dependencies for PythonV2Layer
      run: |
        cd layers/python-v2
        rm -rf python
        # pydantic ships a compiled core (pydantic-core); the V2 functions run
        # on arm64, so cross-install the arm64/cp314 wheels here on the x86_64
        # runner rather than the runner's native wheels (which would ImportError
        # at runtime). --platform requires --only-binary=:all:.
        python3.14 -m pip install --target python \
          --platform manylinux2014_aarch64 \
          --implementation cp \
          --python-version 3.14 \
          --only-binary=:all: \
          -r requirements.txt
        # Ship our shared, hand-authored modules into /opt/python alongside the
        # pip deps. `python/` is gitignored build output (wiped above); the
        # committed source of truth lives in shared/.
        cp shared/*.py python/

    - name: Setup SAM
      uses: aws-actions/setup-sam@v2
      with:
        use-installer: true

    - name: Determine environment
      id: env
      run: |
        if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
          echo "stack_name=groov-api" >> $GITHUB_OUTPUT
          echo "env=prod" >> $GITHUB_OUTPUT
        else
          echo "stack_name=stage-groov-api" >> $GITHUB_OUTPUT
          echo "env=stage" >> $GITHUB_OUTPUT
        fi

    - name: Configure Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Sam Build
      run: sam build

    - name: Deploy SAM application
      run: >
        sam deploy --stack-name ${{ steps.env.outputs.stack_name }}
        --resolve-s3 --resolve-image-repos --capabilities CAPABILITY_IAM
        --parameter-overrides 
        UserPoolId="${{ secrets[format('{0}_USER_POOL_ID', steps.env.outputs.env)] }}" 
        UserPoolClientId="${{ secrets[format('{0}_COGNITO_CLIENT_ID', steps.env.outputs.env)] }}" 
        AdminGroup="${{ secrets[format('{0}_ADMIN_GROUP', steps.env.outputs.env)] }}" 
        TempTableName="${{ secrets[format('{0}_TEMP_TABLE_NAME', steps.env.outputs.env)] }}" 
        TableName="${{ secrets[format('{0}_TABLE_NAME', steps.env.outputs.env)] }}" 
        InterAuthKey="${{ secrets[format('{0}_INTER_AUTH_KEY', steps.env.outputs.env)] }}" 
        Env="${{ steps.env.outputs.env }}" 
        TurnstileSecretKey="${{ secrets.TURNSTILE_SECRET_KEY }}"
        FromEmail="${{ secrets.FROM_EMAIL }}"
        SendToEmail="${{ secrets.SEND_TO_EMAIL }}"
        R2BucketName="${{ secrets[format('{0}_R2_BUCKET_NAME', steps.env.outputs.env)] }}"
        R2AccessKeyId="${{ secrets[format('{0}_R2_ACCESS_KEY_ID', steps.env.outputs.env)] }}"
        R2SecretAccessKey="${{ secrets[format('{0}_R2_SECRET_ACCESS_KEY', steps.env.outputs.env)] }}"
        R2Endpoint="${{ secrets[format('{0}_R2_ENDPOINT', steps.env.outputs.env)] }}"
        --no-confirm-changeset --no-fail-on-empty-changeset
