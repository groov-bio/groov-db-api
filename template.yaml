  AddNewSensorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/addNewSensor
      Handler: addNewSensor.handler
      Runtime: nodejs24.x
      MemorySize: 128
      Timeout: 240
      FunctionName: !Sub ${Env}-add-new-sensor-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_NAME: !Ref TempTableName
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
          GET_OPERON_FUNCTION_ARN: !GetAtt GetOperonFunction.Arn
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /addNewSensor
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /addNewSensor
            Method: options
      Policies:
        - AWSLambdaBasicExecutionRole
        
        - Statement:
            - Effect: Allow
              Action: 
                - lambda:InvokeFunction
              Resource: !GetAtt GetOperonFunction.Arn

        - DynamoDBCrudPolicy:
            TableName: !Ref TempTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName

      Layers:
        - !Ref NodeLayer

