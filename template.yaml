AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Parameters:
  UserPoolId:
    Type: String
  UserPoolClientId:
    Type: String
  AdminGroup:
    Type: String
  TempTableName:
    Type: String
  TableName:
    Type: String
  InterAuthKey:
    Type: String
  Env:
    Type: String
  FromEmail:
    Type: String
  SendToEmail:
    Type: String  
  TurnstileSecretKey:
    Type: String
  R2BucketName:
    Type: String
  R2AccessKeyId:
    Type: String
  R2SecretAccessKey:
    Type: String
  R2Endpoint:
    Type: String
  ProdTableV2Name:
    Type: String
    Default: groov_db_table_v2
  R2KeyPrefix:
    Type: String
    Default: v2/

Resources:
  GroovApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: dev
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
        DetailedMetricsEnabled: true
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
              audience:
                - !Sub "${UserPoolClientId}"
            IdentitySource: "$request.header.Authorization"
          AdminAuthorizer:
            FunctionArn: !GetAtt AdminAuthorizerFunction.Arn
            Identity:
              Headers:
                - Authorization
            EnableSimpleResponses: true
            AuthorizerPayloadFormatVersion: "2.0"
      AccessLogSettings:
        DestinationArn: !GetAtt AccessLogs.Arn
        Format: $context.requestId $context.authorizer.error $context.identity.sourceIp $context.identity.userAgent $context.requestTime $context.httpMethod $context.path $context.protocol $context.status $context.responseLength $context.responseLatency

  NodeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-node-dependencies
      Description: Shared Node.js dependencies
      ContentUri: layers/node/
      CompatibleRuntimes:
        - nodejs24.x
  
  PythonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-python-dependencies
      Description: Shared Node.js dependencies
      ContentUri: layers/python/
      CompatibleRuntimes:
        - python3.12
  
  DocsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/docs
      Handler: docs.handler
      Runtime: nodejs24.x
      FunctionName: !Sub ${Env}-docs-function
      MemorySize: 256
      Environment:
        Variables:
          STAGE_NAME: dev
      Events:
        DocsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /swagger
            Method: get
        OptionsDocsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /swagger
            Method: options
      Layers:
        - !Ref NodeLayer
        
  AdminAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/adminAuthorizer
      Handler: adminAuthorizer.handler
      Runtime: nodejs24.x
      FunctionName: !Sub ${Env}-admin-authorizer-function
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ADMIN_GROUP: !Ref AdminGroup
          REGION: !Ref AWS::Region
      Layers:
        - !Ref NodeLayer
 
  GroovTempTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Env}-groov-temp-v2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  GroovTempTableV2Processed:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Env}-groov-temp-v2-processed
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  InsertFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/insertForm
      Handler: insertForm.handler
      Runtime: nodejs24.x
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-insert-form-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_NAME: !Ref TempTableName
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /insertForm
            Method: post
            Auth:
              Authorizer: CognitoJwtAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /insertForm
            Method: options
      Layers:
        - !Ref NodeLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
        - DynamoDBCrudPolicy:
            TableName: !Ref TempTableName

  InsertFormV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/insertFormV2
      Handler: insertForm.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-insert-form-v2-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/insertForm
            Method: post
            Auth:
              Authorizer: CognitoJwtAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/insertForm
            Method: options
      Layers:
        - !Ref NodeLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2

