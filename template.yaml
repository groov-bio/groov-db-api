  ContactForm:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/contactForm
      Handler: contactForm.handler
      Runtime: nodejs24.x
      MemorySize: 256
      Timeout: 10
      FunctionName: !Sub ${Env}-contact-form-function
      Environment:
        Variables:
          ENV: !Ref Env
          FROM_EMAIL: !Ref FromEmail
          SEND_TO_EMAIL: !Ref SendToEmail
          TURNSTILE_SECRET_KEY: !Ref TurnstileSecretKey
      Architectures:
        - arm64
      Events:
        PostApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /contact_form
            Method: post
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /contact_form
            Method: options
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource:
                - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/my-first-configuration-set"
