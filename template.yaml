AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Parameters:
  UserPoolId:
    Type: String
  UserPoolClientId:
    Type: String
  AdminGroup:
    Type: String
  TempTableName:
    Type: String
  TableName:
    Type: String
  InterAuthKey:
    Type: String
  Env:
    Type: String
  FromEmail:
    Type: String
  SendToEmail:
    Type: String  
  TurnstileSecretKey:
    Type: String
  R2BucketName:
    Type: String
  R2AccessKeyId:
    Type: String
  R2SecretAccessKey:
    Type: String
  R2Endpoint:
    Type: String
  
Resources:
  GroovApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: dev
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
        DetailedMetricsEnabled: true
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
              audience:
                - !Sub "${UserPoolClientId}"
            IdentitySource: "$request.header.Authorization"
          AdminAuthorizer:
            FunctionArn: !GetAtt AdminAuthorizerFunction.Arn
            Identity:
              Headers:
                - Authorization
            EnableSimpleResponses: true
            AuthorizerPayloadFormatVersion: "2.0"
      AccessLogSettings:
        DestinationArn: !GetAtt AccessLogs.Arn
        Format: $context.requestId $context.authorizer.error $context.identity.sourceIp $context.identity.userAgent $context.requestTime $context.httpMethod $context.path $context.protocol $context.status $context.responseLength $context.responseLatency

  NodeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-node-dependencies
      Description: Shared Node.js dependencies
      ContentUri: layers/node/
      CompatibleRuntimes:
        - nodejs24.x
  
  PythonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-python-dependencies
      Description: Shared Node.js dependencies
      ContentUri: layers/python/
      CompatibleRuntimes:
        - python3.12

  # Shared dependencies for the Python 3.14 V2 functions. Only the V2 functions
  # that make outbound HTTP calls (doiLookupV2, addNewSensorV2) need this; the
  # rest rely solely on boto3, which is bundled in the Lambda Python runtime.
  PythonV2Layer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-python-v2-dependencies
      Description: Shared Python 3.14 dependencies for V2 functions (requests)
      ContentUri: layers/python-v2/
      CompatibleRuntimes:
        - python3.14

  DocsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/docs
      Handler: docs.handler
      Runtime: nodejs24.x
      FunctionName: !Sub ${Env}-docs-function
      MemorySize: 256
      Environment:
        Variables:
          STAGE_NAME: dev
      Events:
        DocsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /swagger
            Method: get
        OptionsDocsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /swagger
            Method: options
      Layers:
        - !Ref NodeLayer
        
  AdminAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/adminAuthorizer
      Handler: adminAuthorizer.handler
      Runtime: nodejs24.x
      FunctionName: !Sub ${Env}-admin-authorizer-function
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ADMIN_GROUP: !Ref AdminGroup
          REGION: !Ref AWS::Region
      Layers:
        - !Ref NodeLayer
 
  GroovTempTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Env}-groov-temp-v2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  GroovTempTableV2Processed:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Env}-groov-temp-v2-processed
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  InsertFormV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/insertFormV2
      Handler: insertForm.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-insert-form-v2-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          PROD_TABLE_V2_NAME: groov_db_table_v2
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/insertForm
            Method: post
            Auth:
              Authorizer: CognitoJwtAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/insertForm
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: groov_db_table_v2
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2
      # insertForm.py imports `groov_models` (shared Pydantic validators),
      # which ships in PythonV2Layer. Without this the function fails at
      # import time with "No module named 'groov_models'".
      Layers:
        - !Ref PythonV2Layer

  EditSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/editSensorV2
      Handler: editSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-edit-sensor-v2-function
      Environment:
        Variables:
          PROD_TABLE_V2_NAME: groov_db_table_v2
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/editSensor
            Method: post
            Auth:
              Authorizer: CognitoJwtAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/editSensor
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: groov_db_table_v2
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2Processed

  DoiLookupV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/doiLookupV2
      Handler: doiLookup.lambda_handler
      Runtime: python3.14
      MemorySize: 256
      Timeout: 15
      FunctionName: !Sub ${Env}-doi-lookup-v2-function
      Environment:
        Variables:
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/doiLookup
            Method: get
            Auth:
              Authorizer: CognitoJwtAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/doiLookup
            Method: options
      Layers:
        - !Ref PythonV2Layer

  AddNewSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/addNewSensorV2
      Handler: addNewSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 3008
      # 300s covers the worst case of a heavily-curated sensor (~14 distinct DOIs
      # after dedup) when CrossRef throttling forces retry/backoff on several of
      # them; well under this in the common path. Bumped from 240 alongside the
      # CrossRef 429 resilience fix in addNewSensor.callDOI.
      Timeout: 300
      FunctionName: !Sub ${Env}-add-new-sensor-v2-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/addNewSensor
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/addNewSensor
            Method: options
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2Processed

      Layers:
        - !Ref PythonV2Layer

  GetOperonFunction:      
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getOperon
      Handler: getOperon.lambda_handler
      Runtime: python3.12
      Timeout: 180
      MemorySize: 2048
      FunctionName: !Sub ${Env}-get-operon-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_NAME: !Ref TempTableName
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
      Architectures:
        - arm64
      Layers:
        - !Ref PythonLayer
        
  ContactForm:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/contactForm
      Handler: contactForm.handler
      Runtime: nodejs24.x
      MemorySize: 256
      Timeout: 10
      FunctionName: !Sub ${Env}-contact-form-function
      Environment:
        Variables:
          ENV: !Ref Env
          FROM_EMAIL: !Ref FromEmail
          SEND_TO_EMAIL: !Ref SendToEmail
          TURNSTILE_SECRET_KEY: !Ref TurnstileSecretKey
      Architectures:
        - arm64
      Events:
        PostApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /contact_form
            Method: post
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /contact_form
            Method: options
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource:
                - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/my-first-configuration-set"
                - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${FromEmail}"
      Layers:
        - !Ref NodeLayer
  
  LigandSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ligandSearch
      Handler: ligandSearch.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 120
      FunctionName: !Sub ${Env}-ligand-search-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_NAME: !Ref TempTableName
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
          R2_BUCKET_NAME: !Ref R2BucketName
          R2_ACCESS_KEY_ID: !Ref R2AccessKeyId
          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
      Architectures:
        - x86_64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligandSearch
            Method: post
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligandSearch
            Method: options
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
      Layers:
        - !Ref PythonLayer

  LigifyLigandSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ligifyLigandSearch
      Handler: ligifyLigandSearch.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 120
      FunctionName: !Sub ${Env}-ligify-ligand-search-function
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          TEMP_TABLE_NAME: !Ref TempTableName
          TABLE_NAME: !Ref TableName
          ENV: !Ref Env
          R2_BUCKET_NAME: !Ref R2BucketName
          R2_ACCESS_KEY_ID: !Ref R2AccessKeyId
          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
      Architectures:
        - x86_64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligifyLigandSearch
            Method: post
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligifyLigandSearch
            Method: options
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
      Layers:
        - !Ref PythonLayer
  
  LigifyBlastFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      MemorySize: 1024
      Timeout: 120
      FunctionName: !Sub ${Env}-ligify-blast-function
      Architectures:
        - x86_64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligifyBlast
            Method: post
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /ligifyBlast
            Method: options
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./functions/ligifyBlast
      DockerTag: latest

  GetAllTempSensorsV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getAllTempSensorsV2
      Handler: getAllTempSensors.lambda_handler
      Runtime: python3.14
      MemorySize: 256
      Timeout: 10
      FunctionName: !Sub ${Env}-get-all-temp-sensors-v2-function
      Environment:
        Variables:
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getAllTempSensors
            Method: get
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getAllTempSensors
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GroovTempTableV2

  GetTempSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getTempSensorV2
      Handler: getTempSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-get-temp-sensor-v2-function
      Environment:
        Variables:
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getTempSensor
            Method: get
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getTempSensor
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GroovTempTableV2

  DeleteTempV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/deleteTempV2
      Handler: deleteTemp.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-delete-temp-v2-function
      Environment:
        Variables:
          TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/deleteTemp
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/deleteTemp
            Method: options
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2

  GetAllProcessedTempV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getAllProcessedTempV2
      Handler: getAllProcessedTemp.lambda_handler
      Runtime: python3.14
      MemorySize: 256
      Timeout: 10
      FunctionName: !Sub ${Env}-get-all-processed-temp-v2-function
      Environment:
        Variables:
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getAllProcessedTemp
            Method: get
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getAllProcessedTemp
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GroovTempTableV2Processed

  GetProcessedTempV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getProcessedTempV2
      Handler: getProcessedTemp.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-get-processed-temp-v2-function
      Environment:
        Variables:
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getProcessedTemp
            Method: get
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/getProcessedTemp
            Method: options
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GroovTempTableV2Processed

  ApproveProcessedSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/approveProcessedSensorV2
      Handler: approveProcessedSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 256
      Timeout: 30
      FunctionName: !Sub ${Env}-approve-processed-sensor-v2-function
      Environment:
        Variables:
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          PROD_TABLE_V2_NAME: groov_db_table_v2
          ENV: !Ref Env
          R2_BUCKET_NAME: !Ref R2BucketName
          R2_ACCESS_KEY_ID: !Ref R2AccessKeyId
          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
          FINGERPRINT_LAMBDA_NAME: !Ref UpdateFingerprintV2Function
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/approveProcessedSensor
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/approveProcessedSensor
            Method: options
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2Processed
        - DynamoDBCrudPolicy:
            TableName: groov_db_table_v2
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt UpdateFingerprintV2Function.Arn

  RejectProcessedSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/rejectProcessedSensorV2
      Handler: rejectProcessedSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 10
      FunctionName: !Sub ${Env}-reject-processed-sensor-v2-function
      Environment:
        Variables:
          PROCESSED_TEMP_TABLE_V2_NAME: !Ref GroovTempTableV2Processed
          ENV: !Ref Env
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/rejectProcessedSensor
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/rejectProcessedSensor
            Method: options
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroovTempTableV2Processed

  DeleteSensorV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/deleteSensorV2
      Handler: deleteSensor.lambda_handler
      Runtime: python3.14
      MemorySize: 256
      Timeout: 30
      FunctionName: !Sub ${Env}-delete-sensor-v2-function
      Environment:
        Variables:
          PROD_TABLE_V2_NAME: groov_db_table_v2
          ENV: !Ref Env
          R2_BUCKET_NAME: !Ref R2BucketName
          R2_ACCESS_KEY_ID: !Ref R2AccessKeyId
          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
          FINGERPRINT_LAMBDA_NAME: !Ref UpdateFingerprintV2Function
      Architectures:
        - arm64
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/deleteSensor
            Method: post
            Auth:
              Authorizer: AdminAuthorizer
        OptionsApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroovApi
            Path: /v2/deleteSensor
            Method: options
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: groov_db_table_v2
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt UpdateFingerprintV2Function.Arn

  UpdateFingerprintV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/updateFingerprintV2
      Handler: updateFingerprint.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 120
      FunctionName: !Sub ${Env}-update-fingerprint-v2-function
      Environment:
        Variables:
          ENV: !Ref Env
          R2_BUCKET_NAME: !Ref R2BucketName
          R2_ACCESS_KEY_ID: !Ref R2AccessKeyId
          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
      Architectures:
        - x86_64
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
      Layers:
        - !Ref PythonLayer

  AccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/http-api/${AWS::StackName}
      RetentionInDays: 7
      
  AdminAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AdminAuthorizerFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${GroovApi}/*"

  

Globals:
  Function:
    LoggingConfig:
      LogFormat: JSON
