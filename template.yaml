          R2_SECRET_ACCESS_KEY: !Ref R2SecretAccessKey
          R2_ENDPOINT: !Ref R2Endpoint
      Architectures:
        - x86_64
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${R2BucketName}/*"
      Layers:
        - !Ref PythonLayer

